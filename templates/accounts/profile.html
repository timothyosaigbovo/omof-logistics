{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}My Profile - Omof Logistics{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card service-card p-4">
                <div class="text-center mb-4">
                    <div class="feature-icon">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h2 class="section-title">My Profile</h2>
                    <p class="text-muted">{{ request.user.username }} | {{ request.user.email }}</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-omof w-100 mt-3">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
