{% extends 'base.html' %}

{% block title %}Logout - Omof Logistics{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card service-card p-4 text-center">
                <div class="mb-4">
                    <div class="feature-icon">
                        <i class="fas fa-sign-out-alt"></i>
                    </div>
                    <h2 class="section-title">Sign Out</h2>
                    <p class="text-muted">Are you sure you want to sign out?</p>
                </div>

                <form method="POST" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-omof w-100">Yes, Sign Out</button>
                </form>

                <a href="{% url 'home' %}" class="btn btn-omof-outline w-100 mt-3">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
