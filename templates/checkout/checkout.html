{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">

      <h1 class="fw-bold mb-1">Payment</h1>
      <p class="text-muted mb-4">Enter your card details below. Your payment is secured by Stripe.</p>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <span class="text-muted">Amount due</span>
            <span class="fw-bold fs-4 text-primary">{{ currency }} {{ quote.proposed_price }}</span>
          </div>
          <div class="d-flex justify-content-between align-items-center mt-2">
            <span class="text-muted">Order</span>
            <span class="text-muted small">{{ order.order_number }}</span>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <div id="card-element" class="mb-3 p-3 border rounded"></div>
          <div id="card-errors" class="text-danger small mb-3" role="alert"></div>
          <button id="submit-btn" class="btn btn-primary w-100 btn-lg">
            <span id="btn-text">Pay {{ currency }} {{ quote.proposed_price }}</span>
            <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
          </button>
        </div>
      </div>

      <p class="text-center text-muted small">
        Secured by <strong>Stripe</strong>. We never store your card details.
      </p>

    </div>
  </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
const stripe = Stripe('{{ stripe_public_key }}');
const elements = stripe.elements();
const cardElement = elements.create('card', {
    style: {
        base: { fontSize: '16px', color: '#424770', '::placeholder': { color: '#aab7c4' } },
        invalid: { color: '#dc3545' }
    }
});
cardElement.mount('#card-element');

cardElement.on('change', function (event) {
    const display = document.getElementById('card-errors');
    display.textContent = event.error ? event.error.message : '';
});

document.getElementById('submit-btn').addEventListener('click', async function () {
    this.disabled = true;
    document.getElementById('btn-spinner').classList.remove('d-none');

    const { error, paymentIntent } = await stripe.confirmCardPayment('{{ client_secret }}', {
        payment_method: { card: cardElement }
    });

    if (error) {
        document.getElementById('card-errors').textContent = error.message;
        this.disabled = false;
        document.getElementById('btn-spinner').classList.add('d-none');
    } else if (paymentIntent.status === 'succeeded') {
        window.location.href = '{% url "checkout:checkout_success" order.order_number %}';
    }
});
</script>
{% endblock %}
