<svg width="900" height="1000" viewBox="0 0 900 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="1000" fill="#f9f9f9"/>
  <text x="450" y="24" text-anchor="middle" font-size="15" fill="#1B2A4A" font-weight="bold">Omofo Logistics — Data Schema</text>
  <text x="450" y="42" text-anchor="middle" font-size="11" fill="#888">Entity Relationship Diagram — all custom models and relationships</text>

  <!-- USER (Django built-in) -->
  <rect x="360" y="60" width="180" height="100" rx="6" fill="#1B2A4A" stroke="#1B2A4A" stroke-width="1"/>
  <rect x="360" y="60" width="180" height="24" rx="6" fill="#0d1a2e"/>
  <text x="450" y="77" text-anchor="middle" font-size="12" fill="#2BBCB3" font-weight="bold">User</text>
  <text x="450" y="77" text-anchor="middle" font-size="12" fill="#2BBCB3" font-weight="bold">User</text>
  <text x="375" y="98" font-size="10" fill="#aaa">id (PK)</text>
  <text x="375" y="112" font-size="10" fill="#aaa">username</text>
  <text x="375" y="126" font-size="10" fill="#aaa">email</text>
  <text x="375" y="140" font-size="10" fill="#aaa">password</text>
  <text x="510" y="98" font-size="9" fill="#555" font-style="italic">Django built-in</text>

  <!-- USERPROFILE -->
  <rect x="60" y="60" width="180" height="120" rx="6" fill="#e8f4fd" stroke="#85b7eb" stroke-width="1"/>
  <rect x="60" y="60" width="180" height="24" rx="6" fill="#378ADD"/>
  <text x="150" y="77" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">UserProfile</text>
  <text x="75" y="100" font-size="10" fill="#333">id (PK)</text>
  <text x="75" y="114" font-size="10" fill="#333">user (FK → User)</text>
  <text x="75" y="128" font-size="10" fill="#333">company_name</text>
  <text x="75" y="142" font-size="10" fill="#333">phone</text>
  <text x="75" y="156" font-size="10" fill="#333">preferred_currency</text>

  <!-- SERVICE CATEGORY -->
  <rect x="660" y="60" width="190" height="100" rx="6" fill="#e1f5ee" stroke="#5DCAA5" stroke-width="1"/>
  <rect x="660" y="60" width="190" height="24" rx="6" fill="#1D9E75"/>
  <text x="755" y="77" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">ServiceCategory</text>
  <text x="675" y="100" font-size="10" fill="#333">id (PK)</text>
  <text x="675" y="114" font-size="10" fill="#333">name</text>
  <text x="675" y="128" font-size="10" fill="#333">slug</text>
  <text x="675" y="142" font-size="10" fill="#333">description</text>

  <!-- SERVICE -->
  <rect x="660" y="188" width="190" height="130" rx="6" fill="#e1f5ee" stroke="#5DCAA5" stroke-width="1"/>
  <rect x="660" y="188" width="190" height="24" rx="6" fill="#1D9E75"/>
  <text x="755" y="205" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Service</text>
  <text x="675" y="228" font-size="10" fill="#333">id (PK)</text>
  <text x="675" y="242" font-size="10" fill="#333">category (FK → ServiceCategory)</text>
  <text x="675" y="256" font-size="10" fill="#333">name</text>
  <text x="675" y="270" font-size="10" fill="#333">slug</text>
  <text x="675" y="284" font-size="10" fill="#333">description</text>
  <text x="675" y="298" font-size="10" fill="#333">is_active</text>

  <!-- QUOTEREQUEST -->
  <rect x="330" y="220" width="210" height="200" rx="6" fill="#faeeda" stroke="#EF9F27" stroke-width="1"/>
  <rect x="330" y="220" width="210" height="24" rx="6" fill="#BA7517"/>
  <text x="435" y="237" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">QuoteRequest</text>
  <text x="345" y="260" font-size="10" fill="#333">id (PK)</text>
  <text x="345" y="274" font-size="10" fill="#333">user (FK → User)</text>
  <text x="345" y="288" font-size="10" fill="#333">service (FK → Service)</text>
  <text x="345" y="302" font-size="10" fill="#333">origin</text>
  <text x="345" y="316" font-size="10" fill="#333">destination</text>
  <text x="345" y="330" font-size="10" fill="#333">cargo_description</text>
  <text x="345" y="344" font-size="10" fill="#333">estimated_weight_kg</text>
  <text x="345" y="358" font-size="10" fill="#333">urgency</text>
  <text x="345" y="372" font-size="10" fill="#333">status</text>
  <text x="345" y="386" font-size="10" fill="#333">submitted_at</text>
  <text x="345" y="400" font-size="10" fill="#333">special_requirements</text>

  <!-- QUOTE -->
  <rect x="60" y="240" width="210" height="150" rx="6" fill="#faeeda" stroke="#EF9F27" stroke-width="1"/>
  <rect x="60" y="240" width="210" height="24" rx="6" fill="#BA7517"/>
  <text x="165" y="257" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Quote</text>
  <text x="75" y="280" font-size="10" fill="#333">id (PK)</text>
  <text x="75" y="294" font-size="10" fill="#333">quote_request (OneToOne → QuoteRequest)</text>
  <text x="75" y="308" font-size="10" fill="#333">proposed_price</text>
  <text x="75" y="322" font-size="10" fill="#333">currency</text>
  <text x="75" y="336" font-size="10" fill="#333">valid_until</text>
  <text x="75" y="350" font-size="10" fill="#333">notes</text>
  <text x="75" y="364" font-size="10" fill="#333">issued_at</text>
  <text x="75" y="378" font-size="10" fill="#333">-- admin issues this --</text>

  <!-- NEGOTIATION MESSAGE -->
  <rect x="60" y="430" width="210" height="130" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <rect x="60" y="430" width="210" height="24" rx="6" fill="#534AB7"/>
  <text x="165" y="447" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">NegotiationMessage</text>
  <text x="75" y="470" font-size="10" fill="#333">id (PK)</text>
  <text x="75" y="484" font-size="10" fill="#333">quote (FK → Quote)</text>
  <text x="75" y="498" font-size="10" fill="#333">sender (FK → User)</text>
  <text x="75" y="512" font-size="10" fill="#333">message</text>
  <text x="75" y="526" font-size="10" fill="#333">is_admin</text>
  <text x="75" y="540" font-size="10" fill="#333">sent_at</text>

  <!-- ORDER -->
  <rect x="330" y="470" width="210" height="170" rx="6" fill="#faece7" stroke="#F0997B" stroke-width="1"/>
  <rect x="330" y="470" width="210" height="24" rx="6" fill="#993C1D"/>
  <text x="435" y="487" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Order</text>
  <text x="345" y="510" font-size="10" fill="#333">id (PK)</text>
  <text x="345" y="524" font-size="10" fill="#333">user (FK → User)</text>
  <text x="345" y="538" font-size="10" fill="#333">quote (OneToOne → Quote)</text>
  <text x="345" y="552" font-size="10" fill="#333">order_number (unique)</text>
  <text x="345" y="566" font-size="10" fill="#333">amount_paid</text>
  <text x="345" y="580" font-size="10" fill="#333">currency</text>
  <text x="345" y="594" font-size="10" fill="#333">stripe_payment_intent_id</text>
  <text x="345" y="608" font-size="10" fill="#333">status</text>
  <text x="345" y="622" font-size="10" fill="#333">created_at</text>

  <!-- SHIPMENT -->
  <rect x="600" y="470" width="220" height="140" rx="6" fill="#eaf3de" stroke="#97C459" stroke-width="1"/>
  <rect x="600" y="470" width="220" height="24" rx="6" fill="#3B6D11"/>
  <text x="710" y="487" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Shipment</text>
  <text x="615" y="510" font-size="10" fill="#333">id (PK)</text>
  <text x="615" y="524" font-size="10" fill="#333">order (OneToOne → Order)</text>
  <text x="615" y="538" font-size="10" fill="#333">tracking_reference (unique)</text>
  <text x="615" y="552" font-size="10" fill="#333">current_status</text>
  <text x="615" y="566" font-size="10" fill="#333">estimated_delivery</text>
  <text x="615" y="580" font-size="10" fill="#333">created_at</text>

  <!-- SHIPMENT UPDATE -->
  <rect x="600" y="638" width="220" height="130" rx="6" fill="#eaf3de" stroke="#97C459" stroke-width="1"/>
  <rect x="600" y="638" width="220" height="24" rx="6" fill="#3B6D11"/>
  <text x="710" y="655" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">ShipmentUpdate</text>
  <text x="615" y="678" font-size="10" fill="#333">id (PK)</text>
  <text x="615" y="692" font-size="10" fill="#333">shipment (FK → Shipment)</text>
  <text x="615" y="706" font-size="10" fill="#333">status</text>
  <text x="615" y="720" font-size="10" fill="#333">location</text>
  <text x="615" y="734" font-size="10" fill="#333">description</text>
  <text x="615" y="748" font-size="10" fill="#333">timestamp</text>

  <!-- BLOG POST -->
  <rect x="60" y="610" width="190" height="130" rx="6" fill="#f1efe8" stroke="#B4B2A9" stroke-width="1"/>
  <rect x="60" y="610" width="190" height="24" rx="6" fill="#5F5E5A"/>
  <text x="155" y="627" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">BlogPost</text>
  <text x="75" y="650" font-size="10" fill="#333">id (PK)</text>
  <text x="75" y="664" font-size="10" fill="#333">author (FK → User)</text>
  <text x="75" y="678" font-size="10" fill="#333">title</text>
  <text x="75" y="692" font-size="10" fill="#333">slug</text>
  <text x="75" y="706" font-size="10" fill="#333">body</text>
  <text x="75" y="720" font-size="10" fill="#333">is_published</text>
  <text x="75" y="734" font-size="10" fill="#333">published_at</text>

  <!-- CONTACT MESSAGE -->
  <rect x="290" y="700" width="190" height="120" rx="6" fill="#f1efe8" stroke="#B4B2A9" stroke-width="1"/>
  <rect x="290" y="700" width="190" height="24" rx="6" fill="#5F5E5A"/>
  <text x="385" y="717" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">ContactMessage</text>
  <text x="305" y="740" font-size="10" fill="#333">id (PK)</text>
  <text x="305" y="754" font-size="10" fill="#333">name</text>
  <text x="305" y="768" font-size="10" fill="#333">email</text>
  <text x="305" y="782" font-size="10" fill="#333">subject</text>
  <text x="305" y="796" font-size="10" fill="#333">message</text>
  <text x="305" y="810" font-size="10" fill="#333">sent_at</text>

  <!-- TESTIMONIAL -->
  <rect x="60" y="790" width="190" height="110" rx="6" fill="#f1efe8" stroke="#B4B2A9" stroke-width="1"/>
  <rect x="60" y="790" width="190" height="24" rx="6" fill="#5F5E5A"/>
  <text x="155" y="807" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Testimonial</text>
  <text x="75" y="830" font-size="10" fill="#333">id (PK)</text>
  <text x="75" y="844" font-size="10" fill="#333">author_name</text>
  <text x="75" y="858" font-size="10" fill="#333">company</text>
  <text x="75" y="872" font-size="10" fill="#333">body</text>
  <text x="75" y="886" font-size="10" fill="#333">is_featured</text>

  <!-- RELATIONSHIP LINES -->
  <!-- User → UserProfile -->
  <line x1="240" y1="120" x2="360" y2="120" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="295" y="115" text-anchor="middle" font-size="9" fill="#378ADD">1:1</text>

  <!-- User → QuoteRequest -->
  <line x1="450" y1="160" x2="450" y2="220" stroke="#BA7517" stroke-width="1.5"/>
  <text x="458" y="196" font-size="9" fill="#BA7517">1:many</text>

  <!-- User → Order -->
  <line x1="500" y1="160" x2="500" y2="470" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="505" y="320" font-size="9" fill="#993C1D">1:many</text>

  <!-- ServiceCategory → Service -->
  <line x1="755" y1="160" x2="755" y2="188" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="760" y="178" font-size="9" fill="#1D9E75">1:many</text>

  <!-- Service → QuoteRequest -->
  <line x1="660" y1="253" x2="540" y2="300" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="600" y="272" font-size="9" fill="#BA7517">1:many</text>

  <!-- QuoteRequest → Quote -->
  <line x1="330" y1="320" x2="270" y2="320" stroke="#BA7517" stroke-width="1.5"/>
  <text x="295" y="313" text-anchor="middle" font-size="9" fill="#BA7517">1:1</text>

  <!-- Quote → NegotiationMessage -->
  <line x1="165" y1="390" x2="165" y2="430" stroke="#534AB7" stroke-width="1.5"/>
  <text x="172" y="416" font-size="9" fill="#534AB7">1:many</text>

  <!-- QuoteRequest → Order (via accepted status) -->
  <line x1="435" y1="420" x2="435" y2="470" stroke="#993C1D" stroke-width="1.5"/>
  <text x="442" y="450" font-size="9" fill="#993C1D">1:1</text>

  <!-- Order → Shipment -->
  <line x1="540" y1="558" x2="600" y2="540" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="565" y="545" font-size="9" fill="#3B6D11">1:1</text>

  <!-- Shipment → ShipmentUpdate -->
  <line x1="710" y1="610" x2="710" y2="638" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="716" y="628" font-size="9" fill="#3B6D11">1:many</text>

  <!-- User → BlogPost -->
  <line x1="360" y1="110" x2="155" y2="610" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="240" y="360" font-size="9" fill="#5F5E5A">author</text>

  <!-- Legend -->
  <rect x="30" y="940" width="840" height="50" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="50" y="958" font-size="11" fill="#1B2A4A" font-weight="bold">Legend:</text>
  <line x1="110" y1="954" x2="150" y2="954" stroke="#333" stroke-width="1.5"/>
  <text x="158" y="958" font-size="10" fill="#555">Solid = required FK/OneToOne</text>
  <line x1="330" y1="954" x2="370" y2="954" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="378" y="958" font-size="10" fill="#555">Dashed = optional/indirect relationship</text>
  <text x="50" y="976" font-size="10" fill="#555">PK = Primary Key · FK = Foreign Key · 1:1 = OneToOne · 1:many = ForeignKey</text>
  <text x="560" y="976" font-size="10" fill="#888">No prices stored on Service model — pricing is via Quote only</text>
</svg>
