<svg width="800" height="920" viewBox="0 0 800 920" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="920" fill="#f9f9f9"/>
  <text x="400" y="22" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">WIREFRAME — Client Dashboard</text>

  <!-- Navbar -->
  <rect x="0" y="30" width="800" height="46" fill="#1B2A4A"/>
  <text x="30" y="58" font-size="14" fill="#2BBCB3" font-weight="bold">Omof Logistics</text>
  <text x="220" y="58" font-size="12" fill="#ccc">Home</text>
  <text x="280" y="58" font-size="12" fill="#ccc">Services</text>
  <text x="600" y="58" font-size="12" fill="#fff">Dashboard</text>
  <text x="680" y="58" font-size="12" fill="#ccc">Profile</text>
  <text x="734" y="58" font-size="12" fill="#ccc">Logout</text>

  <!-- Welcome -->
  <text x="30" y="106" font-size="20" fill="#1B2A4A" font-weight="bold">Welcome, Timothy!</text>
  <text x="30" y="126" font-size="12" fill="#888">Manage your quotes, bookings, and shipments from here.</text>

  <!-- Stats row -->
  <rect x="30" y="144" width="170" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="115" y="176" text-anchor="middle" font-size="26" fill="#1B2A4A" font-weight="bold">3</text>
  <text x="115" y="200" text-anchor="middle" font-size="11" fill="#888">Quote Requests</text>

  <rect x="214" y="144" width="170" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="299" y="176" text-anchor="middle" font-size="26" fill="#2BBCB3" font-weight="bold">1</text>
  <text x="299" y="200" text-anchor="middle" font-size="11" fill="#888">Orders</text>

  <rect x="398" y="144" width="170" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="483" y="176" text-anchor="middle" font-size="26" fill="#2BBCB3" font-weight="bold">1</text>
  <text x="483" y="200" text-anchor="middle" font-size="11" fill="#888">In Transit</text>

  <rect x="582" y="144" width="188" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="676" y="176" text-anchor="middle" font-size="26" fill="#28a745" font-weight="bold">0</text>
  <text x="676" y="200" text-anchor="middle" font-size="11" fill="#888">Delivered</text>

  <!-- RFQ section -->
  <text x="30" y="252" font-size="15" fill="#1B2A4A" font-weight="bold">My Quote Requests</text>
  <rect x="650" y="238" width="120" height="26" rx="5" fill="#1B2A4A"/>
  <text x="710" y="256" text-anchor="middle" font-size="11" fill="#fff">+ New request</text>

  <rect x="30" y="268" width="740" height="200" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <!-- Header row -->
  <rect x="30" y="268" width="740" height="34" rx="8" fill="#f5f5f5"/>
  <text x="50" y="290" font-size="11" fill="#888" font-weight="bold">#</text>
  <text x="90" y="290" font-size="11" fill="#888" font-weight="bold">Service</text>
  <text x="220" y="290" font-size="11" fill="#888" font-weight="bold">Route</text>
  <text x="430" y="290" font-size="11" fill="#888" font-weight="bold">Submitted</text>
  <text x="540" y="290" font-size="11" fill="#888" font-weight="bold">Status</text>
  <text x="680" y="290" font-size="11" fill="#888" font-weight="bold">Action</text>

  <!-- Row 1 -->
  <line x1="30" y1="302" x2="770" y2="302" stroke="#eee" stroke-width="1"/>
  <text x="50" y="320" font-size="11" fill="#888">1</text>
  <text x="90" y="320" font-size="11" fill="#333">Air Freight</text>
  <text x="220" y="320" font-size="11" fill="#333">London → Lagos</text>
  <text x="430" y="320" font-size="11" fill="#888">26 Mar 2026</text>
  <rect x="528" y="308" width="80" height="20" rx="10" fill="#ffc107" opacity="0.7"/>
  <text x="568" y="322" text-anchor="middle" font-size="10" fill="#856404">Pending</text>
  <rect x="668" y="308" width="60" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="698" y="322" text-anchor="middle" font-size="10" fill="#333">View</text>

  <!-- Row 2 -->
  <line x1="30" y1="336" x2="770" y2="336" stroke="#eee" stroke-width="1"/>
  <text x="50" y="354" font-size="11" fill="#888">2</text>
  <text x="90" y="354" font-size="11" fill="#333">Customs Clearance</text>
  <text x="220" y="354" font-size="11" fill="#333">Accra → Birmingham</text>
  <text x="430" y="354" font-size="11" fill="#888">20 Mar 2026</text>
  <rect x="528" y="342" width="80" height="20" rx="10" fill="#17a2b8" opacity="0.6"/>
  <text x="568" y="356" text-anchor="middle" font-size="10" fill="#0c5460">Quoted</text>
  <rect x="668" y="342" width="60" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="698" y="356" text-anchor="middle" font-size="10" fill="#333">View</text>

  <!-- Row 3 -->
  <line x1="30" y1="370" x2="770" y2="370" stroke="#eee" stroke-width="1"/>
  <text x="50" y="388" font-size="11" fill="#888">3</text>
  <text x="90" y="388" font-size="11" fill="#333">Ocean Freight</text>
  <text x="220" y="388" font-size="11" fill="#333">Lagos → London</text>
  <text x="430" y="388" font-size="11" fill="#888">15 Mar 2026</text>
  <rect x="528" y="376" width="80" height="20" rx="10" fill="#28a745" opacity="0.6"/>
  <text x="568" y="390" text-anchor="middle" font-size="10" fill="#155724">Accepted</text>
  <rect x="668" y="376" width="60" height="20" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="698" y="390" text-anchor="middle" font-size="10" fill="#333">View</text>

  <!-- Orders section -->
  <text x="30" y="494" font-size="15" fill="#1B2A4A" font-weight="bold">My Orders</text>
  <rect x="30" y="510" width="740" height="160" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="30" y="510" width="740" height="34" rx="8" fill="#f5f5f5"/>
  <text x="50" y="532" font-size="11" fill="#888" font-weight="bold">Order number</text>
  <text x="220" y="532" font-size="11" fill="#888" font-weight="bold">Amount</text>
  <text x="310" y="532" font-size="11" fill="#888" font-weight="bold">Currency</text>
  <text x="400" y="532" font-size="11" fill="#888" font-weight="bold">Date</text>
  <text x="510" y="532" font-size="11" fill="#888" font-weight="bold">Status</text>
  <text x="620" y="532" font-size="11" fill="#888" font-weight="bold">Tracking</text>
  <line x1="30" y1="544" x2="770" y2="544" stroke="#eee" stroke-width="1"/>
  <text x="50" y="562" font-size="10" fill="#333" font-weight="bold">A1B2C3D4E5F6</text>
  <text x="220" y="562" font-size="11" fill="#333">1500.00</text>
  <text x="310" y="562" font-size="11" fill="#333">GBP</text>
  <text x="400" y="562" font-size="11" fill="#888">15 Mar 2026</text>
  <rect x="498" y="550" width="60" height="20" rx="10" fill="#28a745" opacity="0.6"/>
  <text x="528" y="564" text-anchor="middle" font-size="10" fill="#155724">Paid</text>
  <rect x="608" y="550" width="70" height="20" rx="4" fill="#2BBCB3" opacity="0.7"/>
  <text x="643" y="564" text-anchor="middle" font-size="10" fill="#fff">Track →</text>

  <!-- Quick actions -->
  <text x="30" y="696" font-size="15" fill="#1B2A4A" font-weight="bold">Quick Actions</text>
  <rect x="30" y="712" width="226" height="90" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="143" y="748" text-anchor="middle" font-size="13" fill="#1B2A4A" font-weight="bold">Edit Profile</text>
  <text x="143" y="766" text-anchor="middle" font-size="10" fill="#888">Update company details</text>
  <text x="143" y="780" text-anchor="middle" font-size="10" fill="#888">and preferred currency</text>

  <rect x="287" y="712" width="226" height="90" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="748" text-anchor="middle" font-size="13" fill="#1B2A4A" font-weight="bold">Get a Quote</text>
  <text x="400" y="766" text-anchor="middle" font-size="10" fill="#888">Request a shipping quote</text>
  <text x="400" y="780" text-anchor="middle" font-size="10" fill="#888">for your next shipment</text>

  <rect x="544" y="712" width="226" height="90" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="657" y="748" text-anchor="middle" font-size="13" fill="#1B2A4A" font-weight="bold">All Requests</text>
  <text x="657" y="766" text-anchor="middle" font-size="10" fill="#888">View all quote requests</text>
  <text x="657" y="780" text-anchor="middle" font-size="10" fill="#888">and their current status</text>

  <!-- Footer -->
  <rect x="0" y="876" width="800" height="44" fill="#1B2A4A"/>
  <text x="400" y="902" text-anchor="middle" font-size="10" fill="#666">© 2026 Omof Logistics. All Rights Reserved.</text>
</svg>
