<svg width="800" height="840" viewBox="0 0 800 840" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="840" fill="#f9f9f9"/>
  <text x="400" y="22" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">WIREFRAME — Booking Summary + Currency Selector</text>

  <!-- Navbar -->
  <rect x="0" y="30" width="800" height="46" fill="#1B2A4A"/>
  <text x="30" y="58" font-size="14" fill="#2BBCB3" font-weight="bold">Omof Logistics</text>
  <text x="600" y="58" font-size="12" fill="#fff">Dashboard</text>
  <text x="680" y="58" font-size="12" fill="#ccc">Profile</text>
  <text x="734" y="58" font-size="12" fill="#ccc">Logout</text>

  <!-- Page title -->
  <text x="160" y="106" font-size="20" fill="#1B2A4A" font-weight="bold">Booking Summary</text>
  <text x="160" y="126" font-size="12" fill="#888">Review your quote and choose your payment currency before proceeding.</text>

  <!-- Shipment details card -->
  <rect x="160" y="148" width="480" height="180" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="185" y="174" font-size="14" fill="#1B2A4A" font-weight="bold">Shipment details</text>
  <line x1="185" y1="182" x2="620" y2="182" stroke="#eee" stroke-width="1"/>

  <text x="185" y="204" font-size="11" fill="#888">Service</text>
  <text x="380" y="204" font-size="11" fill="#333">Air Freight</text>
  <text x="185" y="224" font-size="11" fill="#888">Origin</text>
  <text x="380" y="224" font-size="11" fill="#333">London, UK</text>
  <text x="185" y="244" font-size="11" fill="#888">Destination</text>
  <text x="380" y="244" font-size="11" fill="#333">Lagos, Nigeria</text>
  <text x="185" y="264" font-size="11" fill="#888">Urgency</text>
  <text x="380" y="264" font-size="11" fill="#333">Standard</text>
  <text x="185" y="284" font-size="11" fill="#888">Quote reference</text>
  <text x="380" y="284" font-size="11" fill="#333">Quote #4 — GBP 1500.00</text>
  <text x="185" y="304" font-size="11" fill="#888">Valid until</text>
  <text x="380" y="304" font-size="11" fill="#333">30 Apr 2026</text>

  <!-- Payment card -->
  <rect x="160" y="344" width="480" height="230" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="185" y="370" font-size="14" fill="#1B2A4A" font-weight="bold">Payment</text>
  <text x="185" y="390" font-size="11" fill="#888">Select your preferred currency. Stripe will process the payment securely.</text>
  <line x1="185" y1="398" x2="620" y2="398" stroke="#eee" stroke-width="1"/>

  <!-- Currency label + dropdown -->
  <text x="185" y="422" font-size="12" fill="#444" font-weight="bold">Currency</text>
  <rect x="185" y="428" width="435" height="38" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="204" y="452" font-size="12" fill="#333">£  GBP — British Pound</text>
  <text x="590" y="452" font-size="14" fill="#888">▾</text>

  <!-- Price display -->
  <text x="185" y="492" font-size="12" fill="#888">Amount:</text>
  <text x="280" y="496" font-size="28" fill="#2BBCB3" font-weight="bold">£ 1500.00 GBP</text>

  <!-- Currency note -->
  <rect x="185" y="512" width="435" height="28" rx="4" fill="#e8f4fd" stroke="#b8daff" stroke-width="1"/>
  <text x="197" y="530" font-size="10" fill="#0c5460">Stripe will convert to your selected currency at the current exchange rate.</text>

  <!-- Annotation arrow pointing to currency dropdown -->
  <line x1="640" y1="447" x2="700" y2="447" stroke="#2BBCB3" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="705" y="452" font-size="10" fill="#2BBCB3">JS updates</text>
  <text x="705" y="464" font-size="10" fill="#2BBCB3">price display</text>

  <!-- Proceed button -->
  <rect x="160" y="590" width="480" height="48" rx="6" fill="#1B2A4A"/>
  <text x="400" y="619" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Proceed to payment</text>

  <!-- Back link -->
  <text x="400" y="660" text-anchor="middle" font-size="12" fill="#2BBCB3">← Back to negotiation</text>

  <!-- Supported currencies note -->
  <rect x="160" y="680" width="480" height="80" rx="8" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="400" y="702" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">Supported currencies</text>
  <text x="185" y="720" font-size="11" fill="#555">£ GBP (British Pound)</text>
  <text x="185" y="736" font-size="11" fill="#555">$ USD (US Dollar)</text>
  <text x="185" y="752" font-size="11" fill="#555">€ EUR (Euro)</text>
  <text x="400" y="720" font-size="11" fill="#555">₦ NGN (Nigerian Naira)</text>
  <text x="400" y="736" font-size="11" fill="#555">CA$ CAD (Canadian Dollar)</text>
  <text x="400" y="752" font-size="11" fill="#555">GH₵ GHS (Ghanaian Cedi)</text>

  <!-- Footer -->
  <rect x="0" y="790" width="800" height="50" fill="#1B2A4A"/>
  <text x="400" y="820" text-anchor="middle" font-size="10" fill="#666">© 2026 Omof Logistics. All Rights Reserved.</text>
</svg>
