<svg width="800" height="900" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="900" fill="#f9f9f9"/>
  <text x="400" y="22" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">WIREFRAME — Negotiation Thread</text>

  <!-- Navbar -->
  <rect x="0" y="30" width="800" height="46" fill="#1B2A4A"/>
  <text x="30" y="58" font-size="14" fill="#2BBCB3" font-weight="bold">Omof Logistics</text>
  <text x="600" y="58" font-size="12" fill="#fff">Dashboard</text>
  <text x="680" y="58" font-size="12" fill="#ccc">Profile</text>
  <text x="734" y="58" font-size="12" fill="#ccc">Logout</text>

  <!-- Page title + status badge -->
  <text x="160" y="106" font-size="20" fill="#1B2A4A" font-weight="bold">Quote #4 — Negotiation</text>
  <rect x="510" y="88" width="110" height="26" rx="13" fill="#17a2b8" opacity="0.7"/>
  <text x="565" y="106" text-anchor="middle" font-size="11" fill="#fff">Negotiating</text>
  <text x="160" y="126" font-size="12" fill="#888">London → Lagos · Air Freight</text>

  <!-- Quote details card -->
  <rect x="160" y="144" width="480" height="96" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="185" y="168" font-size="13" fill="#1B2A4A" font-weight="bold">Quote details</text>
  <text x="185" y="194" font-size="28" fill="#2BBCB3" font-weight="bold">GBP 1,500.00</text>
  <text x="380" y="194" font-size="11" fill="#888">Valid until 30 Apr 2026</text>
  <text x="185" y="218" font-size="11" fill="#888">Standard rate applies for air freight London–Lagos, approx 5–7 days transit.</text>

  <!-- Thread container -->
  <rect x="160" y="256" width="480" height="340" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <!-- Admin message (left bubble) -->
  <rect x="176" y="272" width="300" height="72" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="194" y="292" font-size="10" fill="#888" font-weight="bold">Omofo Logistics · 15 Mar 2026, 10:30</text>
  <text x="194" y="310" font-size="11" fill="#333">Thank you for your request. We can offer</text>
  <text x="194" y="326" font-size="11" fill="#333">air freight at GBP 1,500 for this route.</text>
  <text x="194" y="334" font-size="10" fill="#aaa">Please review and let us know if you have any questions.</text>

  <!-- Client message (right bubble) -->
  <rect x="324" y="360" width="300" height="60" rx="8" fill="#1B2A4A"/>
  <text x="342" y="378" font-size="10" fill="#aaa" font-weight="bold">You · 15 Mar 2026, 14:15</text>
  <text x="342" y="396" font-size="11" fill="#fff">Thank you! Could you consider GBP 1,200?</text>
  <text x="342" y="410" font-size="11" fill="#fff">We ship regularly and can offer volume.</text>

  <!-- Admin message 2 (left bubble) -->
  <rect x="176" y="436" width="300" height="72" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="194" y="456" font-size="10" fill="#888" font-weight="bold">Omofo Logistics · 16 Mar 2026, 09:00</text>
  <text x="194" y="474" font-size="11" fill="#333">We can meet at GBP 1,350 for this shipment,</text>
  <text x="194" y="490" font-size="11" fill="#333">with priority handling included.</text>
  <text x="194" y="504" font-size="10" fill="#aaa">Let us know if you would like to proceed.</text>

  <!-- Message form -->
  <rect x="160" y="612" width="480" height="110" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="180" y="628" width="440" height="56" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="196" y="648" font-size="12" fill="#bbb">Type your message here...</text>
  <rect x="180" y="694" width="130" height="20" rx="4" fill="#1B2A4A"/>
  <text x="245" y="708" text-anchor="middle" font-size="11" fill="#fff">Send message</text>

  <!-- Accept quote card -->
  <rect x="160" y="738" width="480" height="70" rx="8" fill="#f0fff4" stroke="#28a745" stroke-width="1"/>
  <text x="185" y="762" font-size="13" fill="#1B2A4A" font-weight="bold">Happy with this quote?</text>
  <text x="185" y="780" font-size="11" fill="#888">Accepting will take you to payment and currency selection.</text>
  <rect x="530" y="750" width="90" height="36" rx="6" fill="#28a745"/>
  <text x="575" y="773" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Accept</text>

  <!-- Back link -->
  <text x="160" y="828" font-size="12" fill="#2BBCB3">← Back to RFQ</text>

  <!-- Footer -->
  <rect x="0" y="856" width="800" height="44" fill="#1B2A4A"/>
  <text x="400" y="882" text-anchor="middle" font-size="10" fill="#666">© 2026 Omof Logistics. All Rights Reserved.</text>
</svg>
